<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الموظفين - سيماف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header h1 { color: #333; font-size: 2em; margin-bottom: 10px; }
        .factory-name { color: #667eea; font-size: 1.3em; font-weight: bold; }
        
        .controls { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .search-box { display: grid; grid-template-columns: 2fr 1fr 1fr auto auto auto; gap: 15px; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-family: inherit; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; background: #f8f9ff; }
        
        button { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { background: #5568d3; }
        button.btn-green { background: #48bb78; }
        button.btn-red { background: #f56565; }
        button.btn-orange { background: #ed8936; }
        button.btn-blue { background: #3182ce; }
        button.btn-small { padding: 6px 12px; font-size: 0.8em; margin: 0 3px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        th { background: #667eea; color: white; padding: 15px; text-align: right; font-weight: bold; font-size: 0.95em; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 800px; max-height: 95vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .modal-header h2 { color: #333; font-size: 1.5em; }
        .close { background: none; border: none; font-size: 2em; cursor: pointer; color: #aaa; padding: 0; }
        .close:hover { color: #000; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-family: inherit; font-size: 1em; }
        .form-group input:focus { outline: none; border-color: #667eea; background: #f8f9ff; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .badge { display: inline-block; padding: 5px 10px; background: #e3f2fd; color: #1976d2; border-radius: 15px; font-size: 0.9em; font-weight: bold; }
        .stats { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; color: #666; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .employee-image { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid #667eea; margin: 0 auto; cursor: pointer; }
        .image-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 2px solid #ddd; }
        
        .violation-item { background: white; padding: 12px; margin: 10px 0; border-left: 4px solid #ffc107; border-radius: 3px; position: relative; }
        .violation-delete { position: absolute; left: 10px; top: 10px; background: #f56565; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.8em; }
        .violation-image { max-width: 150px; max-height: 150px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .button-group-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        .checkbox-list { background: #f8f9ff; border: 2px solid #ddd; border-radius: 5px; padding: 15px; max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .checkbox-item { padding: 8px; border-bottom: 1px solid #eee; }
        .checkbox-item input { margin-left: 10px; }
        
        .selected-count { background: #48bb78; color: white; padding: 5px 15px; border-radius: 15px; font-weight: bold; }
        
        @media (max-width: 768px) { 
            .search-box { grid-template-columns: 1fr; } 
            .form-row { grid-template-columns: 1fr; }
            .button-group { grid-template-columns: 1fr; }
            .button-group-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="factory-name">🏭 العاملين بمصنع سيماف</div>
            <h1>📊 نظام إدارة الموظفين الكامل</h1>
            <p>إدارة <span id="totalCount">0</span> موظف</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن موظف...">
                <select id="sectorFilter"><option value="">القطاع</option></select>
                <select id="departmentFilter"><option value="">الإدارة</option></select>
                <button class="btn-green" onclick="openAddModal()">➕ إضافة</button>
                <button class="btn-blue" onclick="openBulkMessageModal()">📨 رسالة</button>
                <button class="btn-orange" onclick="exportData()">💾 تحميل</button>
            </div>
        </div>

        <div class="stats" id="stats">جاري التحميل...</div>

        <div style="background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>السجل</th>
                        <th>الاسم</th>
                        <th>الوظيفة</th>
                        <th>القطاع</th>
                        <th>الهاتف</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" style="text-align: center; padding: 40px;">⏳ جاري تحميل الموظفين...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal: تفاصيل الموظف -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailsTitle">تفاصيل الموظف</h2>
                <button class="close" onclick="closeModal('detailsModal')">&times;</button>
            </div>
            <div id="detailsBody"></div>
            <div class="button-group">
                <button class="btn-blue" onclick="openMessageModalSingle()">💬 إرسال رسالة</button>
                <button class="btn-orange" onclick="closeModal('detailsModal')">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Modal: إضافة/تعديل موظف -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="employeeModalTitle">إضافة موظف</h2>
                <button class="close" onclick="closeModal('employeeModal')">&times;</button>
            </div>
            <div id="employeeForm"></div>
            <div class="button-group">
                <button class="btn-green" onclick="saveEmployee()">💾 حفظ</button>
                <button class="btn-red" id="deleteBtn" style="display:none;" onclick="deleteCurrentEmployee()">🗑️ حذف</button>
            </div>
        </div>
    </div>

    <!-- Modal: إضافة جزاء -->
    <div id="violationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚠️ إضافة جزاء</h2>
                <button class="close" onclick="closeModal('violationModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم الموظف:</label>
                <input type="text" id="violationName" readonly style="background: #f0f0f0;">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>نوع الجزاء:</label>
                    <select id="violationType">
                        <option value="">اختر...</option>
                        <option value="تأخير">تأخير ⏰</option>
                        <option value="غياب">غياب 🚫</option>
                        <option value="إنذار">إنذار ⚠️</option>
                        <option value="إيقاف راتب">إيقاف راتب 💰</option>
                        <option value="تعليق">تعليق من العمل</option>
                        <option value="فصل">فصل نهائي</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>التاريخ:</label>
                    <input type="date" id="violationDate">
                </div>
            </div>
            <div class="form-group">
                <label>وصف الجزاء:</label>
                <textarea id="violationDesc" style="min-height: 100px;"></textarea>
            </div>
            <div class="form-group">
                <label>صورة (اختياري):</label>
                <input type="file" id="violationImage" accept="image/*">
            </div>
            <button class="btn-green" onclick="saveViolation()" style="width: 100%; margin-top: 20px;">✅ حفظ الجزاء</button>
        </div>
    </div>

    <!-- Modal: رسالة لموظف واحد -->
    <div id="messageModalSingle" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💬 إرسال رسالة</h2>
                <button class="close" onclick="closeModal('messageModalSingle')">&times;</button>
            </div>
            <div style="background: #e3f2fd; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                <p><strong>إلى: <span id="singleEmpName"></span></strong></p>
                <p><strong>رقم: <span id="singleEmpPhone"></span></strong></p>
            </div>
            <div class="form-group">
                <label>📝 نص الرسالة:</label>
                <textarea id="singleMessageText" placeholder="اكتب الرسالة..."></textarea>
            </div>
            <div class="button-group-3">
                <button class="btn-green" onclick="sendSingleWhatsApp()">💬 WhatsApp</button>
                <button class="btn-blue" onclick="sendSingleSMS()">📱 SMS</button>
                <button class="btn-orange" onclick="copySinglePhone()">📋 انسخ</button>
            </div>
        </div>
    </div>

    <!-- Modal: رسائل جماعية -->
    <div id="bulkMessageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📨 رسالة جماعية</h2>
                <button class="close" onclick="closeModal('bulkMessageModal')">&times;</button>
            </div>
            
            <div style="background: #e3f2fd; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                <p><strong>المختارون: <span id="bulkCount" class="selected-count">0</span></strong></p>
            </div>

            <div class="form-group">
                <label>اختر الموظفين:</label>
                <div style="margin-bottom: 10px;">
                    <button class="btn-green btn-small" onclick="selectAllBulk()">✅ الكل</button>
                    <button class="btn-red btn-small" onclick="deselectAllBulk()">❌ لا أحد</button>
                </div>
                <div class="checkbox-list" id="bulkEmployeesList"></div>
            </div>

            <div class="form-group">
                <label>📝 نص الرسالة:</label>
                <textarea id="bulkMessageText" placeholder="اكتب الرسالة..."></textarea>
            </div>

            <div class="button-group-3">
                <button class="btn-green" onclick="sendBulkWhatsApp()">💬 WhatsApp</button>
                <button class="btn-blue" onclick="sendBulkSMS()">📱 SMS</button>
                <button class="btn-orange" onclick="copyBulkPhones()">📋 انسخ</button>
            </div>
        </div>
    </div>

        function loadData() {
            const saved = localStorage.getItem('employees');
            if (saved) {
                employees = JSON.parse(saved);
            } else {
                employees = JSON.parse(JSON.stringify(initialEmployees));
                employees = employees.map((emp, idx) => ({
                    ...emp,
                    id: idx,
                    indexId: idx,
                    صورة: '',
                    جزاءات: []
                }));
                saveData();
            }
            
            filtered = [...employees];
            display();
            updateFilters();
            document.getElementById('totalCount').textContent = employees.length;
        }

        function saveData() {
            localStorage.setItem('employees', JSON.stringify(employees));
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('keyup', search);
            document.getElementById('sectorFilter').addEventListener('change', search);
            document.getElementById('departmentFilter').addEventListener('change', search);
        }

        function search() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase().trim();
            const sectorValue = document.getElementById('sectorFilter').value;
            const deptValue = document.getElementById('departmentFilter').value;

            filtered = employees.filter(function(emp) {
                // البحث في الاسم والسجل
                let matchSearch = true;
                if (searchValue) {
                    const empName = String(emp.الاسم || '').toLowerCase();
                    const empId = String(emp.سجل || '').toLowerCase();
                    matchSearch = empName.includes(searchValue) || empId.includes(searchValue);
                }

                // البحث في القطاع
                let matchSector = true;
                if (sectorValue) {
                    matchSector = emp.القطاع === sectorValue;
                }

                // البحث في الإدارة
                let matchDept = true;
                if (deptValue) {
                    matchDept = emp.الادارة === deptValue;
                }

                return matchSearch && matchSector && matchDept;
            });

            display();
        }

        function display() {
            const tableBody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">❌ لا توجد نتائج</td></tr>';
                document.getElementById('stats').textContent = '0 نتيجة';
                return;
            }

            tableBody.innerHTML = filtered.map((e, displayIdx) => {
                const actualIdx = employees.findIndex(emp => emp.indexId === e.indexId);
                return `<tr>

            document.getElementById('employeeModalTitle').textContent = '➕ إضافة موظف جديد';
            document.getElementById('deleteBtn').style.display = 'none';
            const fields = ['سجل', 'الاسم', 'الوظيفة', 'الدرجة', 'القطاع', 'الادارة', 'رقم الموبايل', 'رقم قومي', 'تاريخ الميلاد', 'تاريخ التعيين'];
            
            let html = '';
            for (let i = 0; i < fields.length; i += 2) {
                html += `<div class="form-row">
                    <div class="form-group">
                        <label>${fields[i]}</label>
                        <input type="text" data-field="${fields[i]}">
                    </div>
                    ${fields[i+1] ? `<div class="form-group">
                        <label>${fields[i+1]}</label>
                        <input type="text" data-field="${fields[i+1]}">
                    </div>` : ''}
                </div>`;
            }
            html += `<div class="form-group">
                <label>📸 صورة شخصية</label>
                <input type="file" id="empImage" accept="image/*">
            </div>`;
            
            document.getElementById('employeeForm').innerHTML = html;
            openModal('employeeModal');
        }

        function editEmployee(idx) {
            const emp = employees[idx];
            currentEmployeeId = idx;
            document.getElementById('employeeModalTitle').textContent = '✏️ تعديل موظف';
            document.getElementById('deleteBtn').style.display = 'block';
            
            const fields = ['سجل', 'الاسم', 'الوظيفة', 'الدرجة', 'القطاع', 'الادارة', 'رقم الموبايل', 'رقم قومي', 'تاريخ الميلاد', 'تاريخ التعيين'];
            
            let html = '';
            for (let i = 0; i < fields.length; i += 2) {
                html += `<div class="form-row">
                    <div class="form-group">
                        <label>${fields[i]}</label>
                        <input type="text" data-field="${fields[i]}" value="${emp[fields[i]] || ''}">
                    </div>
                    ${fields[i+1] ? `<div class="form-group">
                        <label>${fields[i+1]}</label>
                        <input type="text" data-field="${fields[i+1]}" value="${emp[fields[i+1]] || ''}">
                    </div>` : ''}
                </div>`;
            }
            html += `<div class="form-group">
                <label>📸 صورة شخصية</label>
                <input type="file" id="empImage" accept="image/*">
                ${emp.صورة ? `<img src="${emp.صورة}" class="image-preview">` : ''}
            </div>`;
            
            document.getElementById('employeeForm').innerHTML = html;
            openModal('employeeModal');
        }

        function saveEmployee() {
            const inputs = document.querySelectorAll('#employeeForm input[data-field]');
            const data = {};
            inputs.forEach(inp => {
                data[inp.dataset.field] = inp.value;
            });

            const imageFile = document.getElementById('empImage').files[0];
            
            const updateData = (emp) => {
                if (currentEmployeeId !== null) {
                    employees[currentEmployeeId] = {...employees[currentEmployeeId], ...data, ...emp};
                } else {
                    const newId = Math.max(...employees.map(e => e.indexId), -1) + 1;
                    employees.push({...data, indexId: newId, id: newId, جزاءات: [], ...emp});
                }
                saveData();
                search();
                closeModal('employeeModal');
                alert('✅ تم الحفظ بنجاح');
            };

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    updateData({صورة: e.target.result});
                };
                reader.readAsDataURL(imageFile);
            } else {
                updateData({});
            }
        }

        function deleteCurrentEmployee() {
            if (confirm('هل تريد حذف هذا الموظف؟')) {
                employees.splice(currentEmployeeId, 1);
                saveData();
                search();
                closeModal('employeeModal');
                alert('✅ تم الحذف');
            }
        }

        function openViolationModal(idx) {
            currentViolationId = idx;
            const emp = employees[idx];
            document.getElementById('violationName').value = emp.الاسم;
            document.getElementById('violationType').value = '';
            document.getElementById('violationDesc').value = '';
            document.getElementById('violationDate').valueAsDate = new Date();
            document.getElementById('violationImage').value = '';
            openModal('violationModal');
        }

        function saveViolation() {
            const type = document.getElementById('violationType').value;
            const desc = document.getElementById('violationDesc').value;
            const date = document.getElementById('violationDate').value;
            const imageFile = document.getElementById('violationImage').files[0];

            if (!type || !desc) { alert('⚠️ أكمل البيانات'); return; }

            const saveViolationData = (img = '') => {
                const emp = employees[currentViolationId];
                emp.جزاءات.push({
                    النوع: type,
                    الوصف: desc,
                    التاريخ: date,
                    الصورة: img
                });
                saveData();
                closeModal('violationModal');
                alert('✅ تم إضافة الجزاء');
            };

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    saveViolationData(e.target.result);
                };
                reader.readAsDataURL(imageFile);
            } else {
                saveViolationData();
            }
        }

        function deleteViolation(idx, violationIdx) {
            if (confirm('حذف هذا الجزاء؟')) {
                employees[idx].جزاءات.splice(violationIdx, 1);
                saveData();
                viewDetails(idx);
                alert('✅ تم الحذف');
            }
        }

        // ============ الرسائل ============

        function openMessageModalSingle() {
            const emp = employees[currentSingleEmpId];
            document.getElementById('singleEmpName').textContent = emp.الاسم;
            document.getElementById('singleEmpPhone').textContent = emp['رقم الموبايل'] || 'بدون رقم';
            document.getElementById('singleMessageText').value = '';
            openModal('messageModalSingle');
        }

        function sendSingleWhatsApp() {
            const emp = employees[currentSingleEmpId];
            const msg = document.getElementById('singleMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (!emp['رقم الموبايل']) { alert('⚠️ لا يوجد رقم هاتف'); return; }

            const url = `https://wa.me/${emp['رقم الموبايل']}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
            closeModal('messageModalSingle');
        }

        function sendSingleSMS() {
            const emp = employees[currentSingleEmpId];
            const msg = document.getElementById('singleMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (!emp['رقم الموبايل']) { alert('⚠️ لا يوجد رقم هاتف'); return; }

            const url = `sms:${emp['رقم الموبايل']}?body=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
            closeModal('messageModalSingle');
        }

        function copySinglePhone() {
            const emp = employees[currentSingleEmpId];
            const msg = document.getElementById('singleMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (!emp['رقم الموبايل']) { alert('⚠️ لا يوجد رقم هاتف'); return; }

            const text = `📨 الرسالة:\n${msg}\n\n📱 الرقم:\n${emp['رقم الموبايل']}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ تم النسخ');
                closeModal('messageModalSingle');
            });
        }

        // ============ الرسائل الجماعية ============

        function populateBulkModal() {
            const list = document.getElementById('bulkEmployeesList');
            list.innerHTML = employees.map((e, i) => `
                <div class="checkbox-item">
                    <input type="checkbox" id="bulk${i}" ${selectedForBulk.has(i) ? 'checked' : ''} onchange="toggleBulkSelect(${i})">
                    <label for="bulk${i}">${e.الاسم} - ${e['رقم الموبايل'] || 'بدون رقم'}</label>
                </div>
            `).join('');
        }

        function openBulkMessageModal() {
            populateBulkModal();
            updateBulkCount();
            openModal('bulkMessageModal');
        }

        function toggleBulkSelect(idx) {
            if (selectedForBulk.has(idx)) {
                selectedForBulk.delete(idx);
            } else {
                selectedForBulk.add(idx);
            }
            updateBulkCount();
        }

        function selectAllBulk() {
            employees.forEach((_, i) => selectedForBulk.add(i));
            populateBulkModal();
            updateBulkCount();
        }

        function deselectAllBulk() {
            selectedForBulk.clear();
            populateBulkModal();
            updateBulkCount();
        }

        function updateBulkCount() {
            document.getElementById('bulkCount').textContent = selectedForBulk.size;
        }

        function sendBulkWhatsApp() {
            const msg = document.getElementById('bulkMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (selectedForBulk.size === 0) { alert('⚠️ اختر موظفين'); return; }

            let count = 0;
            Array.from(selectedForBulk).forEach(i => {
                const emp = employees[i];
                if (emp['رقم الموبايل']) {
                    const url = `https://wa.me/${emp['رقم الموبايل']}?text=${encodeURIComponent(msg)}`;
                    window.open(url, '_blank');
                    count++;
                }
            });

            closeModal('bulkMessageModal');
            alert(`✅ تم فتح ${count} محادثة WhatsApp`);
        }

        function sendBulkSMS() {
            const msg = document.getElementById('bulkMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (selectedForBulk.size === 0) { alert('⚠️ اختر موظفين'); return; }

            let count = 0;
            Array.from(selectedForBulk).forEach(i => {
                const emp = employees[i];
                if (emp['رقم الموبايل']) {
                    const url = `sms:${emp['رقم الموبايل']}?body=${encodeURIComponent(msg)}`;
                    window.open(url, '_blank');
                    count++;
                }
            });

            closeModal('bulkMessageModal');
            alert(`✅ تم فتح ${count} رسالة SMS`);
        }

        function copyBulkPhones() {
            const msg = document.getElementById('bulkMessageText').value.trim();
            if (!msg) { alert('⚠️ اكتب الرسالة'); return; }
            if (selectedForBulk.size === 0) { alert('⚠️ اختر موظفين'); return; }

            const phones = Array.from(selectedForBulk)
                .map(i => employees[i]['رقم الموبايل'])
                .filter(p => p)
                .join('\n');

            const text = `📨 الرسالة:\n${msg}\n\n📱 الأرقام:\n${phones}`;
            navigator.clipboard.writeText(text).then(() => {
                alert(`✅ تم نسخ ${selectedForBulk.size} أرقام`);
                closeModal('bulkMessageModal');
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(employees, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'employees_data.json';
            link.click();
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
